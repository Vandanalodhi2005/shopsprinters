<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopsPrinters | Print Smarter with Quality Printers & Ink</title>
    <meta name="description" content="Explore the best deals on printers, ink, toner, and accessories at ShopsPrinters. Your one-stop shop for home and business printing solutions." />
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#ff2d46',
                hover: '#e6253d',
              },
              dark: '#111111',
              light: '#ffffff',
            },
            fontFamily: {
              outfit: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply font-outfit bg-light text-dark overflow-x-hidden;
        }
      }
      @layer components {
        .btn-primary {
          @apply bg-primary text-white py-4 px-10 rounded-full font-bold text-sm uppercase tracking-widest transition-all duration-300 hover:bg-primary-hover hover:-translate-y-1 hover:shadow-2xl hover:shadow-primary/30 active:scale-95;
        }
      }
      @layer utilities {
        .animate-fade-up {
          animation: fadeUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(40px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-subtle-zoom {
          animation: subtleZoom 20s ease-in-out infinite alternate;
        }
        @keyframes subtleZoom {
          from { transform: scale(1); }
          to { transform: scale(1.08); }
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
